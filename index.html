<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkeyMeal 프로젝트 문서 통합 허브</title>
    <!-- Tailwind CSS -->
    <script src="assets/js/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0d9488', secondary: '#f0fdfa' },
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; overflow: hidden; }
        .active-link { background-color: #f0fdfa; color: #0f766e; border-right: 4px solid #0d9488; font-weight: 600; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white shadow-sm z-10 border-b border-slate-200 shrink-0">
        <div class="px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="assets/html/home.html" target="contentFrame" onclick="setActive(this, true)" class="flex items-center gap-3 cursor-pointer" title="홈으로 이동">
                    <div class="w-8 h-8 bg-teal-600 text-white rounded-md flex items-center justify-center font-bold shadow-sm">OK</div>
                    <h1 class="text-xl font-bold text-slate-800 tracking-tight hover:text-teal-600 transition-colors">OkeyMeal 문서 허브</h1>
                </a>
            </div>
            <div class="flex items-center gap-4">
                <!-- Search -->
                <div class="relative hidden md:block">
                    <input type="text" id="searchInput" placeholder="메뉴 검색..." class="pl-9 pr-4 py-1.5 bg-slate-100 border border-transparent rounded-full text-sm focus:bg-white focus:border-teal-400 focus:ring-2 focus:ring-teal-100 outline-none transition-all w-48 text-slate-700">
                    <span class="absolute left-3 top-1.5 text-slate-400 text-sm">🔍</span>
                </div>
                <!-- Refresh Button -->
                <button onclick="refreshFrame()" class="text-slate-400 hover:text-teal-600 transition-colors bg-slate-50 p-1.5 rounded-md border border-slate-200" title="현재 문서 새로고침">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <span class="inline-block bg-slate-100 text-slate-600 text-xs px-3 py-1.5 rounded-full font-medium ml-2">2026 관광데이터 공모전 (과제 5)</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden relative">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 overflow-y-auto z-20">
            <div class="p-5" id="sidebar-menu">
                <!-- Menu dynamically generated by JS -->
            </div>
        </aside>

        <!-- Content Frame -->
        <main class="flex-1 bg-slate-100 relative">
            <div id="loading" class="absolute inset-0 flex items-center justify-center bg-slate-50 z-0 transition-opacity duration-300 opacity-0" style="display: none;">
                <div class="animate-pulse flex flex-col items-center">
                    <div class="w-10 h-10 border-4 border-teal-200 border-t-teal-600 rounded-full animate-spin"></div>
                    <p class="mt-4 text-slate-500 text-sm font-medium">문서를 불러오는 중입니다...</p>
                </div>
            </div>
            <!-- 초기 화면을 home.html로 설정 -->
            <iframe name="contentFrame" id="contentFrame" src="assets/html/home.html" class="absolute inset-0 w-full h-full border-none z-10 bg-white" onload="hideLoading()"></iframe>
        </main>
    </div>

    <script>
        // 1. Menu Configuration (Single Source of Truth)
        // 봇(AI)은 시각화 파일을 추가할 때 이 배열의 구조에 객체를 추가해야 합니다.
        const menuConfig = [
            {
                id: "01",
                title: "01. Analysis Strategy",
                items: [
                    { name: "과제 분석서 (Task Analysis)", path: "01.Analysis_Strategy/html/Task_Analysis/dashboard.html" },
                    { name: "타겟 페르소나 (Target Persona)", path: "01.Analysis_Strategy/html/Target_Persona/personas.html" }
                ]
            },
            {
                id: "02",
                title: "02. Planning Design",
                items: [
                    { name: "요구사항 정의서 (Requirements)", path: "02.Planning_Design/html/Requirements/dashboard.html" },
                    { name: "서비스 구조도 (Architecture)", path: "02.Planning_Design/html/Architecture/diagrams.html" },
                    { name: "기능 목록 명세서 (Feature List)", path: "02.Planning_Design/html/Feature_List/dashboard.html" }
                ]
            },
            {
                id: "03",
                title: "03. Service Development",
                items: []
            },
            {
                id: "04",
                title: "04. Testing QA",
                items: []
            },
            {
                id: "05",
                title: "05. Submission Review",
                items: []
            }
        ];

        // 2. Render Sidebar
        const sidebarContainer = document.getElementById('sidebar-menu');
        
        menuConfig.forEach(section => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'mb-6';
            
            const header = document.createElement('h2');
            header.className = 'text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-3';
            header.innerText = section.title;
            sectionDiv.appendChild(header);

            const nav = document.createElement('nav');
            nav.className = 'space-y-1';
            
            if (section.items.length > 0) {
                section.items.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.path;
                    a.target = 'contentFrame';
                    a.className = 'block px-3 py-2 text-sm text-slate-600 hover:bg-slate-50 rounded-md transition-colors';
                    a.innerText = item.name;
                    a.onclick = function() { setActive(this); };
                    nav.appendChild(a);
                });
            } else {
                const emptyState = document.createElement('div');
                emptyState.className = 'px-3 py-2 text-xs text-slate-400 italic';
                emptyState.innerText = '추가 예정...';
                nav.appendChild(emptyState);
            }
            
            sectionDiv.appendChild(nav);
            sidebarContainer.appendChild(sectionDiv);
        });

        // 3. UI Interactions
        function setActive(element, isHome = false) {
            document.querySelectorAll('aside a').forEach(el => el.classList.remove('active-link'));
            if (!isHome) {
                element.classList.add('active-link');
            }
            showLoading();
        }

        function showLoading() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';
            // Trigger reflow to ensure transition runs
            void loading.offsetWidth;
            loading.style.opacity = '1';
        }

        function hideLoading() {
            const loading = document.getElementById('loading');
            loading.style.opacity = '0';
            setTimeout(() => { loading.style.display = 'none'; }, 300);
        }

        // 4. Refresh Button
        function refreshFrame() {
            const frame = document.getElementById('contentFrame');
            showLoading();
            // iframe reload
            try {
                frame.contentWindow.location.reload(true);
            } catch(e) {
                frame.src = frame.src; // fallback
            }
        }

        // 5. Search Functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('aside nav a').forEach(a => {
                if (a.innerText.toLowerCase().includes(term)) {
                    a.style.display = 'block';
                } else {
                    a.style.display = 'none';
                }
            });
            // Hide empty sections
            document.querySelectorAll('aside > div > div').forEach(section => {
                const nav = section.querySelector('nav');
                const visibleLinks = nav.querySelectorAll('a[style="display: block;"], a:not([style])');
                if (term !== '' && visibleLinks.length === 0) {
                    section.style.display = 'none';
                } else {
                    section.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
