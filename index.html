<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkeyMeal 문서 허브 - 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-full max-w-sm">
        <div class="flex items-center justify-center mb-6">
            <div class="w-12 h-12 bg-teal-600 text-white rounded-xl flex items-center justify-center text-xl font-bold shadow-sm">OK</div>
        </div>
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">OkeyMeal 문서 허브</h2>
        <p class="text-center text-slate-500 mb-8 text-sm">보안을 위해 인증번호를 입력해주세요.</p>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all" placeholder="인증번호" required>
            </div>
            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-3 rounded-lg transition-colors shadow-sm">
                접속하기
            </button>
            <p id="errorMsg" class="text-red-500 text-sm text-center mt-2 hidden">인증번호가 일치하지 않습니다.</p>
        </form>
    </div>

    <script>
        // SHA-256 Hashing Function
        async function digestMessage(message) {
            const msgUint8 = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // Generate hash of entered password
            const hashedInput = await digestMessage(passwordInput);
            
            // The pre-calculated hash of the correct password
            const validHash = '14b7f0fb0ed3eaea8e8e527d507d2099ff0066bcc51d7ef6d85044f76a82f6ef';

            if (hashedInput === validHash) {
                // Success
                sessionStorage.setItem('okeymeal_auth', validHash);
                window.location.replace('dashboard.html');
            } else {
                // Fail
                errorMsg.classList.remove('hidden');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // If already authenticated, skip login
        if (sessionStorage.getItem('okeymeal_auth') === '14b7f0fb0ed3eaea8e8e527d507d2099ff0066bcc51d7ef6d85044f76a82f6ef') {
            window.location.replace('dashboard.html');
        }
    </script>
</body>
</html>
